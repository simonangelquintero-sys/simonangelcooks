<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Simon Angel Cooks: cocina venezolana, recetas, ebooks, noticias gastronómicas y podcast." />
  <title>Simon Angel Cooks</title>
  <style>
    :root{
      --bg:#0b1220;
      --bg2:#111827;
      --card:#162033;
      --text:#f8fafc;
      --muted:#cbd5e1;
      --accent:#f97316;
      --accent2:#22c55e;
      --accent3:#60a5fa;
      --line:rgba(255,255,255,.12);
    }

    *{box-sizing:border-box}

    html{scroll-behavior:smooth}

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top, rgba(249,115,22,.18), transparent 30%),
        linear-gradient(180deg, #0f172a 0%, #0b1220 55%, #020617 100%);
      color:var(--text);
      line-height:1.6;
    }

    a{color:inherit; text-decoration:none}

    .wrap{
      max-width:1180px;
      margin:0 auto;
      padding:22px;
    }

    header{
      position:sticky;
      top:0;
      z-index:10;
      backdrop-filter: blur(14px);
      background:rgba(2,6,23,.62);
      border:1px solid var(--line);
      border-radius:22px;
      padding:16px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
      margin-top:10px;
    }

    .brand{
      display:flex;
      flex-direction:column;
      gap:3px;
      min-width:220px;
    }

    .brand h1{
      margin:0;
      font-size:1.35rem;
      letter-spacing:.3px;
    }

    .brand span{
      color:var(--muted);
      font-size:.92rem;
    }

    nav{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    nav a{
      padding:10px 14px;
      border:1px solid transparent;
      border-radius:999px;
      color:var(--muted);
      transition:.2s ease;
    }

    nav a:hover{
      color:var(--text);
      border-color:var(--line);
      background:rgba(255,255,255,.04);
    }

    .nav-btn{
      padding:10px 16px;
      border-radius:999px;
      background:var(--accent);
      color:#111827;
      font-weight:700;
      border:0;
    }

    .hero{
      display:grid;
      grid-template-columns:1.35fr .95fr;
      gap:22px;
      margin-top:22px;
      align-items:stretch;
    }

    .panel{
      background:rgba(22,32,51,.88);
      border:1px solid var(--line);
      border-radius:26px;
      padding:30px;
      box-shadow:0 24px 60px rgba(0,0,0,.24);
    }

    .hero h2{
      margin:0 0 14px;
      font-size:clamp(2rem, 4vw, 3.7rem);
      line-height:1.05;
    }

    .hero p{
      margin:0 0 16px;
      color:var(--muted);
      max-width:65ch;
      font-size:1.03rem;
    }

    .cta-row{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-top:22px;
    }
